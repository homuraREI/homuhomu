<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>烤鹅腿の诱惑</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    font-family: "Microsoft YaHei", sans-serif;
    background: #fff8e7;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
}
#game {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #fff4d6 0%, #ffe8b8 50%, #ffd89c 100%);
    overflow: hidden;
    cursor: pointer;
}

#title-bar {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.85);
    padding: 6px 20px;
    border-radius: 20px;
    box-shadow: 0 3px 10px rgba(255,165,0,0.25);
    color: #d2691e;
    font-weight: bold;
    font-size: 16px;
    z-index: 100;
    border: 2px solid #ffb74d;
}

#scene-area {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 60%;
    overflow: hidden;
}

#stall-img {
    position: absolute;
    right: 5%;
    top: 18%;
    width: 35%;
    max-width: 180px;
    z-index: 5;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.25));
    animation: float 2.5s ease-in-out infinite;
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

#character {
    position: absolute;
    bottom: 3%;
    left: 5%;
    width: 30%;
    max-width: 160px;
    transition: left 1.5s ease-in-out, bottom 1.5s ease-in-out, transform 0.3s;
    z-index: 10;
    filter: drop-shadow(0 0 12px rgba(0,0,0,0.2));
}
#character.moved {
    left: 38%;
    bottom: 3%;
}

.fp-view {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-width: 60vw;
    max-height: 50vh;
    z-index: 5;
    filter: drop-shadow(0 5px 20px rgba(0,0,0,0.3));
}
#bag { cursor: pointer; transition: transform 0.4s, opacity 0.4s; }
#goose-leg {
    display: none;
    animation: glow 1.5s ease-in-out infinite alternate;
}
@keyframes glow {
    from { filter: drop-shadow(0 0 10px #00ff00) drop-shadow(0 0 20px #7fff00); }
    to { filter: drop-shadow(0 0 25px #00ff7f) drop-shadow(0 0 40px #adff2f); }
}

#hint {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,193,7,0.95);
    color: #5d4037;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 90;
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    white-space: nowrap;
}
@keyframes pulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.05); }
}

#stall-label {
    position: absolute;
    right: 8%;
    top: 10%;
    background: linear-gradient(135deg, #ff7043, #ff5722);
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
    box-shadow: 0 3px 8px rgba(255,87,34,0.4);
    z-index: 6;
}

#bottom-area {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,248,225,0.5) 0%, rgba(255,236,179,0.95) 30%);
    z-index: 40;
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-y: auto;
}

#dialogue {
    width: 95%;
    max-width: 700px;
    background: rgba(255, 253, 245, 0.98);
    border: 3px solid #ff9800;
    border-radius: 15px;
    padding: 14px 18px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    display: none;
}
#dialogue .speaker {
    color: #e65100;
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 6px;
}
#dialogue .text {
    color: #4e342e;
    font-size: 14px;
    line-height: 1.5;
}
#dialogue .next-tip {
    text-align: right;
    color: #ff9800;
    font-size: 12px;
    margin-top: 6px;
    animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

#choices {
    display: none;
    flex-direction: column;
    gap: 8px;
    width: 95%;
    max-width: 500px;
}
.choice-btn {
    background: linear-gradient(135deg, #ffb74d, #ff9800);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 22px;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255,152,0,0.4);
    transition: all 0.3s;
    font-weight: bold;
    border: 2px solid #fff;
}
.choice-btn:active { transform: scale(0.97); }
.choice-btn.b2 { background: linear-gradient(135deg, #ef5350, #c62828); box-shadow: 0 4px 12px rgba(198,40,40,0.4); }
.choice-btn.b3 { background: linear-gradient(135deg, #66bb6a, #2e7d32); box-shadow: 0 4px 12px rgba(46,125,50,0.4); }

#slide-hint {
    position: absolute;
    top: 72%;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5722;
    font-weight: bold;
    font-size: 14px;
    z-index: 60;
    background: rgba(255,255,255,0.95);
    padding: 8px 16px;
    border-radius: 15px;
    display: none;
    animation: pulse 1.2s ease-in-out infinite;
    white-space: nowrap;
}

.emoji-pop {
    position: absolute;
    font-size: 36px;
    animation: popUp 1s ease-out;
    z-index: 100;
    pointer-events: none;
}
@keyframes popUp {
    0% { transform: scale(0) translateY(0); opacity: 1; }
    100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
}

#progress-bar {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    max-width: 250px;
    height: 12px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    overflow: hidden;
    display: none;
    border: 2px solid #ff9800;
    z-index: 70;
}
#progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    transition: width 0.3s;
}

#transition-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
}
#transition-text {
    color: #fff;
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 8px;
    opacity: 0;
    animation: fadeInOut 3s ease-in-out forwards;
}
@keyframes fadeInOut {
    0% { opacity: 0; transform: scale(0.8); }
    30%, 70% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.1); }
}

#news-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #f0f2f5;
    display: none;
    z-index: 250;
    overflow-y: auto;
    padding: 0;
}
.phone-header {
    background: #fff;
    padding: 15px 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
}
.phone-header .time { font-weight: bold; color: #333; font-size: 14px; }
.phone-header .icons { color: #666; font-size: 14px; }

.news-push {
    background: #fff;
    margin: 15px;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.2s;
    border-left: 4px solid #ff5722;
}
.news-push:active { transform: scale(0.98); }
.news-push .source {
    color: #999;
    font-size: 12px;
    margin-bottom: 6px;
}
.news-push .news-title {
    color: #d32f2f;
    font-size: 16px;
    font-weight: bold;
    line-height: 1.4;
    margin-bottom: 8px;
}
.news-push .news-preview {
    color: #666;
    font-size: 13px;
    line-height: 1.5;
}
.tap-hint {
    text-align: center;
    color: #ff5722;
    font-size: 13px;
    padding: 10px;
    animation: blink 1s infinite;
}

#news-detail {
    display: none;
    background: #fff;
    margin: 10px;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
#news-detail h2 {
    color: #d32f2f;
    font-size: 18px;
    line-height: 1.4;
    margin-bottom: 12px;
}
#news-detail .meta {
    color: #999;
    font-size: 12px;
    margin-bottom: 15px;
    padding-bottom: 12px;
    border-bottom: 1px solid #eee;
}
#news-detail .content {
    color: #333;
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 20px;
}

.comments-section {
    background: #fff;
    margin: 10px;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: none;
}
.comments-title {
    font-weight: bold;
    color: #4caf50;
    font-size: 15px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #4caf50;
}
.comment-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    opacity: 0;
    animation: slideIn 0.5s ease-out forwards;
}
@keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}
.comment-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
}
.comment-body { flex: 1; }
.comment-name {
    font-weight: bold;
    color: #555;
    font-size: 13px;
    margin-bottom: 4px;
}
.comment-text {
    color: #333;
    font-size: 13px;
    line-height: 1.5;
}

#next-act-btn {
    display: none;
    margin: 20px auto;
    background: linear-gradient(135deg, #ff7043, #f4511e);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(244,81,30,0.4);
}

#chat-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #ededed;
    display: none;
    z-index: 260;
    flex-direction: column;
}
.chat-header {
    background: #f7f7f7;
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #ddd;
    font-weight: bold;
    color: #333;
    font-size: 15px;
}
.chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #ededed;
}
.chat-tap-hint {
    text-align: center;
    color: #999;
    font-size: 12px;
    padding: 10px;
    animation: blink 1.2s infinite;
}
.msg-item {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    animation: msgIn 0.4s ease-out;
}
@keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.msg-avatar {
    width: 38px;
    height: 38px;
    border-radius: 5px;
    object-fit: cover;
    flex-shrink: 0;
    background: #fff;
}
.msg-content {
    background: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 220px;              /* 关键：固定最大宽度，所有气泡换行点统一 */
    color: #333;
    font-size: 14px;
    line-height: 1.5;
    word-break: normal;            /* 不强制每字断行 */
    overflow-wrap: break-word;     /* 仅超长内容才断 */
    white-space: pre-wrap;         /* 保留换行符，自然换行 */
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    box-sizing: border-box;
    display: inline-block;         /* 短消息贴合文字，长消息在 max-width 处换行 */
}
.msg-content img {
    max-width: 200px;
    border-radius: 6px;
    display: block;
}
.msg-name {
    font-size: 11px;
    color: #888;
    margin-bottom: 3px;
}

.msg-item.self {
    flex-direction: row-reverse;
}
.msg-item.self .msg-content {
    background: #95ec69;
}

#system-prompt {
    background: rgba(0,0,0,0.7);
    color: #ffd700;
    padding: 12px 20px;
    border-radius: 8px;
    text-align: center;
    margin: 15px auto;
    max-width: 85%;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid #ffd700;
    display: none;
    animation: glowSys 1.5s ease-in-out infinite alternate;
}
@keyframes glowSys {
    from { box-shadow: 0 0 10px #ffd700; }
    to { box-shadow: 0 0 25px #ffd700, 0 0 40px #ffa500; }
}

#ending {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,243,224,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 400;
    text-align: center;
    padding: 20px;
}
#ending h1 {
    color: #d84315;
    font-size: 28px;
    margin-bottom: 15px;
}
#ending-subtitle {
    color: #6d4c41;
    font-size: 16px;
    margin-bottom: 15px;
    font-weight: bold;
}
#ending img {
    max-width: 250px;
    max-height: 250px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
#restart {
    background: linear-gradient(135deg, #66bb6a, #43a047);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(67,160,71,0.4);
}
#restart:active { transform: scale(0.97); }

.bag-opening {
    animation: bagSlide 0.6s ease-out forwards;
}
@keyframes bagSlide {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.1) rotate(15deg); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(1.3) rotate(30deg); opacity: 0; }
}

@media (max-width: 600px) {
    #character { max-width: 130px; width: 32%; }
    #stall-img { max-width: 140px; width: 38%; }
    #title-bar { font-size: 14px; padding: 5px 15px; }
    #hint { font-size: 12px; padding: 6px 14px; }
    .choice-btn { font-size: 12px; padding: 9px 14px; }
}

@media (min-width: 768px) {
    #character { max-width: 200px; width: 22%; }
    #stall-img { max-width: 220px; width: 25%; }
    #character.moved { left: 45%; }
}
</style>
</head>
<body>
<div id="game">
    <div id="title-bar">🍗 烤鹅腿の诱惑 🍗</div>
    
    <div id="scene-area">
        <div id="prologue">
            <div id="hint">👆 点击屏幕，让周鹤眠走向烤鹅腿摊位！</div>
            <div id="stall-label">🍗 烤鹅腿摊</div>
            <img id="stall-img" src="https://gz-vchar-pub.nosdn.127.net/20260615171257_file.png" alt="摊位">
            <img id="character" src="https://gz-vchar-pub.nosdn.127.net/20260615171248_file.png" alt="周鹤眠">
        </div>

        <div id="fp-scene" style="display:none;">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <img id="bag" class="fp-view" src="https://gz-vchar-pub.nosdn.127.net/20260615171302_file.png" alt="纸袋">
            <img id="goose-leg" class="fp-view" src="https://gz-vchar-pub.nosdn.127.net/20260615171253_file.png" alt="鹅腿">
        </div>
    </div>

    <div id="slide-hint">👆 连续点击划开纸袋！</div>

    <div id="bottom-area">
        <div id="dialogue">
            <div class="speaker"></div>
            <div class="text"></div>
            <div class="next-tip">点击继续 ▼</div>
        </div>

        <div id="choices">
            <button class="choice-btn" onclick="chooseOption(1)">1. 好哒好哒谢谢阿姨 🥺</button>
            <button class="choice-btn b2" onclick="chooseOption(2)">2. 这颜色有毒吧？打12315举报！📞</button>
            <button class="choice-btn b3" onclick="chooseOption(3)">3. 健康轻食？这必须买全班份请客！🎉</button>
        </div>
    </div>

    <div id="transition-screen">
        <div id="transition-text">第 二 天</div>
    </div>

    <div id="news-screen">
        <div class="phone-header">
            <span class="time" id="news-time">08:30</span>
            <span class="icons">📶 📡 🔋88%</span>
        </div>
        <div id="news-list"></div>
        <div id="news-detail"></div>
        <div class="comments-section" id="comments-section">
            <div class="comments-title">💬 校内群评论</div>
            <div id="comments-list"></div>
        </div>
        <button id="next-act-btn" onclick="goToChat()">查看周鹤眠的消息 💬</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header" id="chat-title">周鹤眠</div>
        <div class="chat-body" id="chat-body"></div>
        <div class="chat-tap-hint" id="chat-tap-hint">👆 点击屏幕继续</div>
    </div>

    <div id="ending">
        <h1 id="ending-title">🎉 The End 🎉</h1>
        <div id="ending-subtitle"></div>
        <img id="ending-img" src="" alt="">
        <p id="ending-text" style="color:#5d4037;font-size:15px;margin-bottom:25px;line-height:1.7;max-width:500px;"></p>
        <button id="restart" onclick="location.reload()">🔄 再玩一次</button>
    </div>
</div>

<script>
let stage = 0;
let clickCount = 0;
const REQUIRED_CLICKS = 5;
let currentEnding = 0;
const dialogue = document.getElementById('dialogue');
const speakerEl = dialogue.querySelector('.speaker');
const textEl = dialogue.querySelector('.text');
const character = document.getElementById('character');
const hint = document.getElementById('hint');

function playSound(type) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        if (type === 'sizzle') { o.type = 'sawtooth'; o.frequency.value = 80; g.gain.value = 0.05; }
        else if (type === 'click') { o.type = 'square'; o.frequency.value = 600; g.gain.value = 0.08; }
        else if (type === 'rip') { o.type = 'sawtooth'; o.frequency.value = 200; g.gain.value = 0.1; }
        else if (type === 'msg') { o.type = 'sine'; o.frequency.value = 800; g.gain.value = 0.06; }
        o.start();
        setTimeout(() => { o.stop(); ctx.close(); }, type === 'sizzle' ? 300 : 100);
    } catch(e) {}
}

function showDialogue(speaker, text) {
    speakerEl.textContent = speaker;
    textEl.textContent = text;
    dialogue.style.display = 'block';
    document.getElementById('choices').style.display = 'none';
}

function hideDialogue() { dialogue.style.display = 'none'; }

function showEmoji(emoji, x, y) {
    const e = document.createElement('div');
    e.className = 'emoji-pop';
    e.textContent = emoji;
    e.style.left = x + 'px';
    e.style.top = y + 'px';
    document.getElementById('game').appendChild(e);
    setTimeout(() => e.remove(), 1000);
}

document.getElementById('game').addEventListener('click', function(e) {
    if (e.target.classList.contains('choice-btn')) return;
    if (e.target.id === 'restart' || e.target.id === 'next-act-btn') return;
    
    if (stage === 0) {
        playSound('click');
        character.classList.add('moved');
        hint.style.display = 'none';
        showEmoji('🤤', e.clientX, e.clientY);
        setTimeout(() => {
            stage = 1;
            showDialogue('周鹤眠（内心独白）', '下课了，又到了最期待的环节……阿姨的烤鹅腿，我来了！🍗✨');
            playSound('sizzle');
        }, 1700);
    } else if (stage === 1 && e.target.closest('#dialogue')) {
        stage = 2;
        hideDialogue();
        document.getElementById('prologue').style.display = 'none';
        document.getElementById('fp-scene').style.display = 'block';
        document.getElementById('slide-hint').style.display = 'block';
        document.getElementById('progress-bar').style.display = 'block';
    } else if (stage === 3 && e.target.closest('#dialogue')) {
        stage = 4;
        showDialogue('阿姨（面不改色，慈祥微笑）😊', '这是大葱叶榨汁腌制浸泡形成的绿色食品，无任何添加剂，无任何危害，请放心食用。');
    } else if (stage === 4 && e.target.closest('#dialogue')) {
        stage = 5;
        hideDialogue();
        document.getElementById('choices').style.display = 'flex';
    }
});

document.getElementById('bag').addEventListener('click', function(e) {
    if (stage !== 2) return;
    e.stopPropagation();
    clickCount++;
    playSound('rip');
    const fill = document.getElementById('progress-fill');
    fill.style.width = (clickCount / REQUIRED_CLICKS * 100) + '%';
    this.style.transform = `translate(-50%, -50%) rotate(${clickCount * 5}deg) scale(${1 + clickCount * 0.03})`;
    showEmoji('✨', e.clientX, e.clientY);
    
    if (clickCount >= REQUIRED_CLICKS) {
        this.classList.add('bag-opening');
        document.getElementById('slide-hint').style.display = 'none';
        document.getElementById('progress-bar').style.display = 'none';

function showNews(ending) {
    const news = newsData[ending];

    const list = document.getElementById('news-list');
    list.style.display = 'block';
    list.innerHTML = `
        <div class="news-push" onclick="openNewsDetail()">
            <div class="source">📰 研思镇日报推送</div>
            <div class="news-title">${news.title}</div>
            <div class="news-preview">${news.preview}</div>
        </div>
        <div class="tap-hint">👆 点击新闻查看详情</div>
    `;
    document.getElementById('news-detail').style.display = 'none';
    document.getElementById('comments-section').style.display = 'none';
    document.getElementById('next-act-btn').style.display = 'none';
    screen.style.display = 'block';

function openNewsDetail() {
    const news = newsData[currentEnding];
    const detail = document.getElementById('news-detail');
    detail.innerHTML = `
        <h2>${news.title}</h2>
        <div class="meta">${news.meta}</div>
        <div class="content">${news.content}</div>
    `;
    detail.style.display = 'block';
    document.getElementById('news-list').style.display = 'none';
    
    setTimeout(() => {
        const cs = document.getElementById('comments-section');
        const cl = document.getElementById('comments-list');
        cl.innerHTML = '';
        cs.style.display = 'block';
        news.comments.forEach((c, i) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <img class="comment-avatar" src="${c.avatar}" alt="${c.name}">
                    <div class="comment-body">
                        <div class="comment-name">${c.name}</div>
                        <div class="comment-text">${c.text}</div>
                    </div>
                `;
                cl.appendChild(div);
                playSound('msg');
            }, i * 600);
        });
        setTimeout(() => {
            document.getElementById('next-act-btn').style.display = 'block';
        }, news.comments.length * 600 + 500);
    }, 600);
}

            sysDiv.id = 'system-prompt';

function appendChatMsg(msg) {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div');
    div.className = 'msg-item' + (msg.self ? ' self' : '');
    let contentHtml = '';
    if (msg.img) {
        contentHtml = `<img src="${msg.img}" alt="image">`;
    } else {
        contentHtml = msg.text;
    }
    div.innerHTML = `
        ${msg.avatar ? `<img class="msg-avatar" src="${msg.avatar}" alt="">` : `<div class="msg-avatar" style="background:#95ec69;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;">${msg.name ? msg.name[0] : '我'}</div>`}
        <div>
            ${msg.name ? `<div class="msg-name">${msg.name}</div>` : ''}
            <div class="msg-content">${contentHtml}</div>
        </div>
    `;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    playSound('msg');
}

    const data = endingData[currentEnding];

    document.getElementById('ending-text').textContent = data.text;
    document.getElementById('ending').style.display = 'flex';
}

}
